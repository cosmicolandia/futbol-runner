<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fútbol Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameWrapper {
            position: relative;
            width: 400px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
        }

        canvas {
            background-color: #2e7d32;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            touch-action: none;
            width: 100%;
            height: 100%;
            border: 3px solid #4caf50;
            border-radius: 10px;
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 2px black;
            z-index: 1005;
            display: none;
            white-space: nowrap;
            color: white;
        }
        
        #btnPausa {
            position: absolute;
            bottom: 70px; /* Alineado a la altura del jugador */
            right: 20px;
            width: 40px;
            height: 40px;
            background: transparent; /* Sin círculo de fondo */
            color: #fff;
            border: none; /* Sin bordes */
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1030;
            font-size: 20px; /* Tamaño más pequeño */
            opacity: 0.7; /* Más discreto */
            transition: opacity 0.2s, transform 0.1s;
            user-select: none;
        }

        #btnPausa:active {
            opacity: 1;
            transform: scale(1.2);
        }

        #pantallaInicio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1020;
            text-align: center;
            border-radius: 10px;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        #pantallaInicio h1 {
            color: #ffeb3b;
            font-size: 40px;
            margin: 0 0 20px 0;
            text-shadow: 3px 3px 0 #000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .instrucciones-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 30px;
        }

        .inst-item {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #4caf50;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .inst-item b {
            display: block;
            color: #ffeb3b;
            margin-bottom: 4px;
            font-size: 14px;
        }
        
        #btnJugar {
            padding: 18px 60px;
            font-size: 26px;
            font-weight: bold;
            background-color: #ffeb3b;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #bcaa00;
            transition: all 0.1s;
            animation: latido 1.5s infinite;
        }

        #btnJugar:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #bcaa00;
        }
        
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #mensaje {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 25px;
            border-radius: 15px;
            display: none;
            cursor: pointer;
            border: 2px solid #ff5722;
            z-index: 1010;
            color: white;
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="ui">
            🏃 <span id="distVal">0</span>m | ⚽ <span id="pelotasVal">0</span> | 🏆 <span id="copasVal">0</span> | 🥅 <span id="golesVal">0</span>
        </div>

        <!-- Botón de pausa minimalista -->
        <div id="btnPausa" onclick="togglePausa()">⏸️</div>

        <div id="pantallaInicio">
            <h1>Fútbol Runner</h1>
            <div class="instrucciones-grid">
                <div class="inst-item">
                    <b>🎮 MUEVETE</b>
                    Desliza o usa flechas para esquivar.
                </div>
                <div class="inst-item">
                    <b>⚽ PELOTAS</b>
                    Cada 50 pelotas ganas 1 trofeo extra.
                </div>
                <div class="inst-item">
                    <b>🏆 TROFEOS</b>
                    Son vidas extra si fallas un penal.
                </div>
                <div class="inst-item">
                    <b>🥅 PENALES</b>
                    Doble toque para el GOL cada 2km.
                </div>
            </div>
            <button id="btnJugar" onclick="empezarJuego()">¡A JUGAR!</button>
        </div>

        <div id="mensaje" onclick="volverAlInicio()">
            <span id="textoMensaje" style="color: #ff5722;"></span><br><br>
            <span id="resumenDistancia"></span><br>
            <span id="resumenGoles"></span><br><br>
            <span style="font-size: 16px; color: #4caf50;">(Toca para continuar)</span>
        </div>

        <canvas id="juego" width="400" height="600"></canvas>
    </div>

<script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    
    const distDOM = document.getElementById('distVal');
    const pelotasDOM = document.getElementById('pelotasVal');
    const copasDOM = document.getElementById('copasVal');
    const golesDOM = document.getElementById('golesVal');
    const msjBox = document.getElementById('mensaje');
    const msjTexto = document.getElementById('textoMensaje');
    const pantallaInicio = document.getElementById('pantallaInicio');
    const interfazUI = document.getElementById('ui');
    const btnPausa = document.getElementById('btnPausa');

    let estado = 'INICIO'; 
    let pausado = false;
    let distancia = 0;
    let pelotas = 0;
    let copas = 0;
    let goles = 0;
    let velocidadY = 6;
    let frameCount = 0;
    
    let timerPenal = 0;
    let textoPenal = "";
    let colorPenal = "";
    let proxCopa = 500;
    let proxArco = 2000;

    const jugador = { x: 200, y: 500, size: 40, emoji: '🏃‍♂️' };
    let targetX = 200; 
    const arco = { x: 200, y: 100, width: 80, height: 40, emoji: '🥅', vx: 5, activo: false };
    let objetos = [];
    let tiro = null;

    let ultimoToque = 0;
    let teclas = { izquierda: false, derecha: false };

    canvas.addEventListener('pointermove', (e) => {
        if (estado === 'JUGANDO' && !pausado) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; 
            targetX = (e.clientX - rect.left) * scaleX;
        }
    });

    window.addEventListener('keydown', (e) => {
        if (estado === 'INICIO' && e.code === 'Enter') empezarJuego();
        if (e.key === 'ArrowLeft') teclas.izquierda = true;
        if (e.key === 'ArrowRight') teclas.derecha = true;
        if (e.code === 'Space' && estado === 'PENAL' && !tiro && !pausado) disparar();
        if ((e.key.toLowerCase() === 'p' || e.key === 'Escape') && (estado === 'JUGANDO' || estado === 'PENAL')) togglePausa();
    });
    
    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft') teclas.izquierda = false;
        if (e.key === 'ArrowRight') teclas.derecha = false;
    });

    canvas.addEventListener('pointerdown', (e) => {
        if (pausado) return;
        let ahora = Date.now();
        if (ahora - ultimoToque < 300 && estado === 'PENAL' && !tiro) {
            disparar();
        }
        ultimoToque = ahora;
    });

    function togglePausa() {
        if (estado !== 'JUGANDO' && estado !== 'PENAL') return;
        pausado = !pausado;
        btnPausa.innerText = pausado ? "▶️" : "⏸️";
    }

    function disparar() {
        tiro = { x: jugador.x, y: jugador.y, vy: -14, size: 25, emoji: '⚽' };
    }

    function spawnObjeto() {
        const tipos = [
            { tipo: 'obstaculo', emoji: '🚧', prob: 0.15, nombre: 'barrera' },
            { tipo: 'obstaculo', emoji: '🟥', prob: 0.15, nombre: 'tarjeta roja' },
            { tipo: 'obstaculo', emoji: '🚑', prob: 0.15, nombre: 'lesión médica' },
            { tipo: 'cono', prob: 0.35, nombre: 'cono naranja' },
            { tipo: 'pelota', emoji: '⚽', prob: 0.20, nombre: 'pelota' }
        ];
        
        let rand = Math.random();
        let acumulado = 0;
        let objElegido = tipos[0];
        
        for (let t of tipos) {
            acumulado += t.prob;
            if (rand < acumulado) {
                objElegido = t;
                break;
            }
        }

        objetos.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: -50,
            size: 30,
            tipo: objElegido.tipo,
            emoji: objElegido.emoji,
            nombre: objElegido.nombre
        });
    }

    function actualizar() {
        if (estado === 'INICIO' || estado === 'GAMEOVER' || pausado) return;

        if (estado === 'JUGANDO') {
            distancia += velocidadY / 10;
            distDOM.innerText = Math.floor(distancia);
            velocidadY = 6 + (distancia / 800); 
            if (velocidadY > 15) velocidadY = 15;

            if (teclas.izquierda) {
                jugador.x -= 8;
                targetX = jugador.x;
            } else if (teclas.derecha) {
                jugador.x += 8;
                targetX = jugador.x;
            } else {
                jugador.x += (targetX - jugador.x) * 0.3;
            }

            if (jugador.x < 20) jugador.x = 20;
            if (jugador.x > canvas.width - 20) jugador.x = canvas.width - 20;
            targetX = jugador.x; 

            if (distancia >= proxCopa) {
                objetos.push({ x: Math.random() * (canvas.width - 40) + 20, y: -50, size: 35, tipo: 'copa', emoji: '🏆' });
                proxCopa += 500;
            }

            if (distancia >= proxArco) {
                estado = 'PENAL';
                arco.activo = true;
                objetos = [];
                targetX = canvas.width / 2;
                jugador.x = canvas.width / 2;
            }

            frameCount++;
            if (frameCount % Math.max(8, 35 - Math.floor(velocidadY)) === 0) spawnObjeto();

            for (let i = objetos.length - 1; i >= 0; i--) {
                let obj = objetos[i];
                obj.y += velocidadY;

                let dx = jugador.x - obj.x;
                let dy = jugador.y - obj.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 25) { 
                    if (obj.tipo === 'obstaculo' || obj.tipo === 'cono') {
                        let msjFinal = "¡Perdiste!";
                        if (obj.nombre === 'lesión médica') msjFinal = "¡Te lesionaste!";
                        else if (obj.nombre === 'tarjeta roja') msjFinal = "¡Te echaron!";
                        perder(msjFinal);
                        return;
                    } else if (obj.tipo === 'pelota') {
                        pelotas++;
                        if (pelotas > 0 && pelotas % 50 === 0) { copas++; copasDOM.innerText = copas; }
                        pelotasDOM.innerText = pelotas;
                        objetos.splice(i, 1);
                    } else if (obj.tipo === 'copa') {
                        copas++;
                        copasDOM.innerText = copas;
                        objetos.splice(i, 1);
                    }
                } else if (obj.y > canvas.height + 50) {
                    objetos.splice(i, 1);
                }
            }
        } 
        else if (estado === 'PENAL') {
            arco.x += arco.vx;
            if (arco.x < 40 || arco.x > canvas.width - 40) arco.vx *= -1; 
            if (tiro) {
                tiro.y += tiro.vy;
                if (tiro.y <= arco.y + 10) {
                    if (Math.abs(tiro.x - arco.x) < arco.width / 2 + 10) {
                        goles++;
                        golesDOM.innerText = goles;
                        textoPenal = "¡GOL! PASASTE ✅";
                        colorPenal = "#4caf50";
                        timerPenal = 60;
                        estado = 'RESULTADO_PENAL';
                    } else if (tiro.y < -20) {
                        if (copas > 0) {
                            copas--;
                            copasDOM.innerText = copas;
                            textoPenal = "¡AFUERA! ❌";
                            colorPenal = "#f44336";
                            timerPenal = 50;
                            estado = 'RESULTADO_PENAL';
                        } else {
                            perder("¡Erraste el penal final!");
                            return;
                        }
                    }
                }
            }
        }
        else if (estado === 'RESULTADO_PENAL') {
            timerPenal--;
            if (timerPenal <= 0) {
                if (textoPenal.includes("✅")) {
                    proxArco += 2000;
                    estado = 'JUGANDO';
                    arco.activo = false;
                    tiro = null;
                    distancia += 50;
                } else {
                    estado = 'PENAL';
                    tiro = null;
                }
            }
        }
    }

    function dibujarConoNaranja(x, y) {
        ctx.fillStyle = '#ff5722';
        ctx.beginPath();
        ctx.moveTo(x, y - 15);
        ctx.lineTo(x + 15, y + 15);
        ctx.lineTo(x - 15, y + 15);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(x - 6, y - 2);
        ctx.lineTo(x + 6, y - 2);
        ctx.lineTo(x + 10, y + 7);
        ctx.lineTo(x - 10, y + 7);
        ctx.fill();
    }

    function dibujar() {
        ctx.fillStyle = '#2e7d32';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        for(let i = 0; i < canvas.height; i += 100) {
            let offset = (estado === 'INICIO' || estado === 'GAMEOVER' || pausado) ? 0 : (distancia % 100);
            ctx.moveTo(0, i + offset);
            ctx.lineTo(canvas.width, i + offset);
        }
        ctx.stroke();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (let obj of objetos) {
            if (obj.tipo === 'cono') dibujarConoNaranja(obj.x, obj.y);
            else { ctx.font = obj.size + 'px Arial'; ctx.fillText(obj.emoji, obj.x, obj.y); }
        }

        if (estado === 'PENAL' || estado === 'RESULTADO_PENAL') {
            ctx.font = '50px Arial';
            ctx.fillText(arco.emoji, arco.x, arco.y);
            if (estado === 'PENAL' && !tiro) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(20, canvas.height/2 - 60, canvas.width - 40, 140);
                ctx.fillStyle = '#ffffff';
                ctx.font = '18px Arial';
                ctx.fillText('¡DOBLE TOQUE PARA PATEAR!', canvas.width/2, canvas.height/2 - 10);
                ctx.fillStyle = '#ffeb3b';
                ctx.fillText(`🏆 Vidas: ${copas + 1}`, canvas.width / 2, canvas.height/2 + 30);
            }
            if (estado === 'RESULTADO_PENAL') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, canvas.height/2 - 40, canvas.width, 80);
                ctx.fillStyle = colorPenal;
                ctx.font = 'bold 26px Arial';
                ctx.fillText(textoPenal, canvas.width/2, canvas.height/2);
            }
        }

        if (tiro) { ctx.font = tiro.size + 'px Arial'; ctx.fillText(tiro.emoji, tiro.x, tiro.y); }

        ctx.font = jugador.size + 'px Arial';
        ctx.fillText(jugador.emoji, jugador.x, jugador.y);
        
        if (estado !== 'GAMEOVER' && (!tiro)) {
            ctx.font = '15px Arial';
            let offsetY = 15 + (pausado ? 0 : Math.sin(frameCount * 0.5) * 5);
            ctx.fillText('⚽', jugador.x + 12, jugador.y + offsetY);
        }

        if (pausado) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffeb3b';
            ctx.font = 'bold 50px Arial';
            ctx.fillText('PAUSA', canvas.width/2, canvas.height/2);
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Toca el botón para seguir', canvas.width/2, canvas.height/2 + 50);
        }
    }

    function loop() {
        actualizar();
        dibujar();
        requestAnimationFrame(loop);
    }

    function empezarJuego() {
        pantallaInicio.style.display = 'none';
        interfazUI.style.display = 'block';
        btnPausa.style.display = 'flex';
        reiniciarJuego();
    }

    function volverAlInicio() {
        msjBox.style.display = 'none';
        interfazUI.style.display = 'none';
        btnPausa.style.display = 'none';
        pantallaInicio.style.display = 'flex';
        estado = 'INICIO';
    }

    function perder(motivo) {
        estado = 'GAMEOVER';
        btnPausa.style.display = 'none';
        msjTexto.innerHTML = motivo;
        document.getElementById('resumenDistancia').innerHTML = `Llegaste a: <b>${Math.floor(distancia)}m</b>`;
        document.getElementById('resumenGoles').innerHTML = `Goles: <b>${goles}</b>`;
        msjBox.style.display = 'block';
    }

    function reiniciarJuego() {
        estado = 'JUGANDO';
        pausado = false;
        distancia = 0;
        pelotas = 0;
        copas = 0;
        goles = 0;
        velocidadY = 6;
        proxCopa = 500;
        proxArco = 2000;
        objetos = [];
        tiro = null;
        arco.activo = false;
        btnPausa.innerText = "⏸️";
        distDOM.innerText = 0;
        pelotasDOM.innerText = 0;
        copasDOM.innerText = 0;
        golesDOM.innerText = 0;
        msjBox.style.display = 'none';
        targetX = canvas.width / 2;
        jugador.x = canvas.width / 2;
    }

    loop();
</script>
</body>
</html>
